<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8" />
  <title>Smart City - Dashboard Interativo</title>
  <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css"/>
  <!-- Google Fonts for improved typography -->
  <link href="https://fonts.googleapis.com/css?family=Roboto:300,400,700&display=swap" rel="stylesheet">
  <!-- External CSS -->
  <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>

<!-- Navigation Bar -->
<nav class="navbar navbar-expand-md navbar-light bg-light">
  <a class="navbar-brand" href="/">
    <img src="/static/images/feup_logo.png" alt="FEUP Logo">
  </a>
  <button class="navbar-toggler" type="button" data-toggle="collapse" data-target="#navbarNav" 
          aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
    <span class="navbar-toggler-icon">☰</span>
  </button>
  <div class="collapse navbar-collapse" id="navbarNav">
    <ul class="navbar-nav ml-auto">
      <li class="nav-item"><a class="nav-link" href="/">Home</a></li>
      <li class="nav-item"><a class="nav-link active" href="/dashboard">Dashboard</a></li>
      <li class="nav-item"><a class="nav-link" href="/team">Equipa</a></li>
    </ul>
  </div>
</nav>

<!-- Hero Section -->
<section class="hero">
  <div class="hero-content container">
    <h1>Dashboard Interativo</h1>
    <p>Monitore as métricas e o status dos estacionamentos da sua maquete Smart City em tempo real.</p>
  </div>
</section>

<!-- Main Dashboard Section -->
<section class="section">
  <div class="container">
    <div class="text-center">
      <h2 class="section-title">Status dos Estacionamentos</h2>
    </div>
    <!-- Parking Slots Layout -->
    <div id="slots-layout" class="d-flex flex-wrap justify-content-center"></div>
    <!-- Chart Section -->
    <div class="mt-5">
      <canvas id="parkingChart"></canvas>
    </div>
  </div>
</section>

<script src="https://code.jquery.com/jquery-3.5.1.slim.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/popper.js@1.16.1/dist/umd/popper.min.js"></script>
<script src="https://maxcdn.bootstrapcdn.com/bootstrap/4.5.2/js/bootstrap.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script>
  const slotsLayout = document.getElementById('slots-layout');
  let parkingChart;
  
  // Simulate fetching parking data (replace with actual API calls)
  function fetchParkingData() {
    const data = [
      { slot_id: 1, is_free: Math.random() > 0.5 },
      { slot_id: 2, is_free: Math.random() > 0.5 },
      { slot_id: 3, is_free: Math.random() > 0.5 },
      { slot_id: 4, is_free: Math.random() > 0.5 },
      { slot_id: 5, is_free: Math.random() > 0.5 },
      { slot_id: 6, is_free: Math.random() > 0.5 },
    ];
    
    slotsLayout.innerHTML = '';
    let freeCount = 0, occupiedCount = 0;
    
    data.forEach(slot => {
      const slotBox = document.createElement('div');
      slotBox.classList.add('slot-box');
      if (slot.is_free) {
        slotBox.classList.add('slot-free');
        slotBox.textContent = 'Slot ' + slot.slot_id;
        freeCount++;
      } else {
        slotBox.classList.add('slot-occupied');
        slotBox.textContent = 'Slot ' + slot.slot_id;
        occupiedCount++;
      }
      slotsLayout.appendChild(slotBox);
    });
    
    updateChart(freeCount, occupiedCount);
  }
  
  // Initialize Chart.js doughnut chart
  function initChart() {
    const ctx = document.getElementById('parkingChart').getContext('2d');
    parkingChart = new Chart(ctx, {
      type: 'doughnut',
      data: {
        labels: ['Occupied', 'Free'],
        datasets: [{
          data: [0, 6],
          backgroundColor: ['#dc3545', '#28a745']
        }]
      },
      options: {
        responsive: true,
        title: {
          display: true,
          text: 'Parking Occupancy'
        }
      }
    });
  }
  
  function updateChart(free, occupied) {
    parkingChart.data.datasets[0].data = [occupied, free];
    parkingChart.update();
  }
  
  document.addEventListener('DOMContentLoaded', () => {
    initChart();
    fetchParkingData();
    setInterval(fetchParkingData, 5000);
  });
</script>
</body>
</html>
