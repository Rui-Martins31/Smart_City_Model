<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Smart City Dashboard</title>
  <!-- Bootstrap CSS CDN -->
  <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">
  <!-- Chart.js CDN -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    body {
      padding-top: 20px;
      background-color: #f8f9fa;
    }
    .card {
      margin: 15px 0;
    }
    #dashboard-header {
      margin-bottom: 30px;
    }
  </style>
</head>
<body>

<div class="container">
  <!-- Header -->
  <div id="dashboard-header" class="text-center">
    <h1>Smart City Dashboard</h1>
    <p>Monitor metrics from our 3D miniature smart city project.</p>
  </div>

  <!-- Metrics Section -->
  <div class="row">
    <!-- Free Parking Slots Metric -->
    <div class="col-md-4">
      <div class="card text-white bg-success">
        <div class="card-body">
          <h4 class="card-title">Free Parking Slots</h4>
          <p class="card-text" id="parking-metric">Loading...</p>
        </div>
      </div>
    </div>
    
    <!-- You can add more metric cards here -->
    <div class="col-md-4">
      <div class="card text-white bg-info">
        <div class="card-body">
          <h4 class="card-title">Another Metric</h4>
          <p class="card-text">Data Placeholder</p>
        </div>
      </div>
    </div>
    
    <div class="col-md-4">
      <div class="card text-white bg-warning">
        <div class="card-body">
          <h4 class="card-title">Additional Info</h4>
          <p class="card-text">Data Placeholder</p>
        </div>
      </div>
    </div>
  </div>

  <!-- Visualization Section -->
  <div class="row">
    <div class="col-md-12">
      <div class="card">
        <div class="card-body">
          <canvas id="parkingChart"></canvas>
        </div>
      </div>
    </div>
  </div>

</div>

<!-- jQuery and Bootstrap JS CDN -->
<script src="https://code.jquery.com/jquery-3.5.1.slim.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/popper.js@1.16.1/dist/umd/popper.min.js"></script>
<script src="https://maxcdn.bootstrapcdn.com/bootstrap/4.5.2/js/bootstrap.min.js"></script>

<!-- Dashboard Script -->
<script>
// Function to fetch metric data and update the page
function fetchParkingData() {
  fetch('/api/parking')
    .then(response => response.json())
    .then(data => {
      // Update the metric card text
      document.getElementById('parking-metric').textContent = data.free_slots + ' / ' + data.total_slots;
      
      // Update the chart with new data
      updateChart(data.free_slots, data.total_slots);
    })
    .catch(error => console.error('Error fetching parking data:', error));
}

// Setup Chart.js chart
let ctx = document.getElementById('parkingChart').getContext('2d');
let parkingChart = new Chart(ctx, {
    type: 'doughnut',
    data: {
        labels: ['Occupied', 'Free'],
        datasets: [{
            data: [0, 100],  // Default values
            backgroundColor: ['#dc3545', '#28a745'],
        }]
    },
    options: {
        responsive: true,
        title: {
            display: true,
            text: 'Parking Occupancy'
        }
    }
});

// Function to update the chart with the latest data
function updateChart(freeSlots, totalSlots) {
  let occupiedSlots = totalSlots - freeSlots;
  parkingChart.data.datasets[0].data = [occupiedSlots, freeSlots];
  parkingChart.update();
}

// Refresh data every 5 seconds
setInterval(fetchParkingData, 5000);

// Initial load
fetchParkingData();
</script>

</body>
</html>
